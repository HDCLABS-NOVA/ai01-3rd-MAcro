<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>티켓 예매 - 공연 목록</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header>
    <div class="header-content">
      <a href="index.html" class="logo">🎫 Ticket</a>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">공연</a></li>
          <li><a href="#">랭킹</a></li>
          <li><a href="#">이벤트</a></li>
        </ul>
      </nav>
      <div class="user-menu"></div>
    </div>
  </header>

  <main class="page-wrapper">
    <div class="container">
      <h1 class="page-title">공연 예매</h1>
      <p class="page-subtitle">다양한 공연을 한눈에 확인하고 예매하세요</p>

      <!-- 카테고리 필터 -->
      <div class="filter-section mb-lg">
        <button class="btn btn-outline filter-btn active" data-category="all">전체</button>
        <button class="btn btn-outline filter-btn" data-category="concert">콘서트</button>
        <button class="btn btn-outline filter-btn" data-category="musical">뮤지컬</button>
        <button class="btn btn-outline filter-btn" data-category="sports">스포츠</button>
        <button class="btn btn-outline filter-btn" data-category="exhibition">전시/체험</button>
      </div>

      <!-- 공연 목록 -->
      <div id="performance-list" class="grid grid-3"></div>
    </div>
  </main>

  <style>
    .filter-section {
      display: flex;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
    }
    .filter-btn.active {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }
  </style>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    let performances = [];
    let currentFilter = 'all';

    async function loadPerformances() {
      try {
        const response = await fetch('data/performances.json');
        const data = await response.json();
        performances = data.performances;
        displayPerformances();
      } catch (error) {
        console.error('공연 데이터 로드 실패:', error);
        showAlert('공연 정보를 불러오는데 실패했습니다.', 'error');
      }
    }

    function displayPerformances() {
      const listDiv = document.getElementById('performance-list');
      const filtered = currentFilter === 'all' 
        ? performances 
        : performances.filter(p => p.category === currentFilter);

      listDiv.innerHTML = filtered.map(perf => `
        <div class="performance-card" onclick="selectPerformance('${perf.id}')">
          <div class="performance-card-image" style="background: linear-gradient(135deg, ${getRandomGradient()})">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-size: 48px;">
              ${getCategoryIcon(perf.category)}
            </div>
          </div>
          <div class="performance-card-content">
            <span class="performance-card-category">${getCategoryName(perf.category)}</span>
            <h3 class="performance-card-title">${perf.title}</h3>
            <p class="performance-card-venue">📍 ${perf.venue}</p>
            <p class="performance-card-date">📅 ${formatDateKorean(perf.dates[0])} ${perf.dates.length > 1 ? '외 ' + (perf.dates.length - 1) + '일' : ''}</p>
          </div>
        </div>
      `).join('');
    }

    function getCategoryIcon(category) {
      const icons = {
        concert: '🎤',
        musical: '🎭',
        sports: '⚽',
        exhibition: '🖼️'
      };
      return icons[category] || '🎫';
    }

    function getCategoryName(category) {
      const names = {
        concert: '콘서트',
        musical: '뮤지컬',
        sports: '스포츠',
        exhibition: '전시'
      };
      return names[category] || '공연';
    }

    function getRandomGradient() {
      const gradients = [
        '#667eea 0%, #764ba2 100%',
        '#f093fb 0%, #f5576c 100%',
        '#4facfe 0%, #00f2fe 100%',
        '#43e97b 0%, #38f9d7 100%',
        '#fa709a 0%, #fee140 100%',
        '#30cfd0 0%, #330867 100%'
      ];
      return gradients[Math.floor(Math.random() * gradients.length)];
    }

    function selectPerformance(perfId) {
      navigateTo(`performance_detail.html?id=${perfId}`);
    }

    // 필터 버튼 이벤트
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.category;
        displayPerformances();
      });
    });

    // 페이지 로드
    loadPerformances();
  </script>
</body>
</html>
