<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 티켓 오픈 시간 관리</title>
    <meta name="description" content="티켓 예매 시스템 관리자 페이지. 공연별 티켓 오픈 시간을 설정하고 관리합니다.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <h1>🎫 티켓 오픈 시간 관리</h1>
            <p>공연별 티켓 판매 오픈 시간을 설정하고 관리합니다</p>

            <div class="header-actions">
                <button class="btn btn-primary" id="addPerformanceBtn">
                    ➕ 새 공연 추가
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='/'">
                    🏠 메인으로
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='viewer.html'">
                    📊 로그 뷰어
                </button>
            </div>
        </header>

        <!-- Performance List -->
        <section>
            <div id="performancesContainer" class="performances-grid">
                <div class="loading">공연 목록을 불러오는 중...</div>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="js/admin.js"></script>
</body>

</html>
