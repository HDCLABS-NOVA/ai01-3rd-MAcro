<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 티켓 오픈 시간 관리</title>
    <meta name="description" content="티켓 예매 시스템 관리자 페이지. 공연별 티켓 오픈 시간을 설정하고 관리합니다.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <h1>🎫 티켓 오픈 시간 관리</h1>
            <p>공연별 티켓 판매 오픈 시간을 설정하고 관리합니다</p>

            <div class="header-actions">
                <button class="btn btn-primary" id="addPerformanceBtn">
                    ➕ 새 공연 추가
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='/'">
                    🏠 메인으로
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='viewer.html'">
                    📊 로그 뷰어
                </button>
            </div>
        </header>

        <!-- Performance List -->
        <section>
            <div id="performancesContainer" class="performances-grid">
                <div class="loading">공연 목록을 불러오는 중...</div>
            </div>
        </section>
    </div>

    <!-- Add Performance Modal -->
    <div id="addPerformanceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ 새 공연 추가</h2>
            </div>
            <div class="modal-body">
                <form id="addPerformanceForm">
                    <div class="form-group">
                        <label for="perf_id">공연 ID (영문/숫자, 고유값)</label>
                        <input type="text" id="perf_id" name="id" placeholder="예: perf005" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_title">공연명</label>
                        <input type="text" id="perf_title" name="title" placeholder="예: 2026 월드 투어" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_category">카테고리</label>
                        <select id="perf_category" name="category" required>
                            <option value="concert">콘서트 (Concert)</option>
                            <option value="musical">뮤지컬 (Musical)</option>
                            <option value="sports">스포츠 (Sports)</option>
                            <option value="exhibition">전시 (Exhibition)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="perf_venue">장소</label>
                        <input type="text" id="perf_venue" name="venue" placeholder="예: 예술의 전당" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_dates">공연 날짜 (콤마로 구분)</label>
                        <input type="text" id="perf_dates" name="dates" placeholder="예: 2026-03-01, 2026-03-02"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="perf_times">공연 시간 (콤마로 구분)</label>
                        <input type="text" id="perf_times" name="times" placeholder="예: 19:30, 14:00" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_open_time">티켓 오픈 시간</label>
                        <input type="datetime-local" id="perf_open_time" name="open_time" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_desc">설명</label>
                        <textarea id="perf_desc" name="description" placeholder="공연에 대한 간단한 설명을 입력하세요"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="closeModalBtn">취소</button>
                <button type="submit" form="addPerformanceForm" class="btn btn-primary">공연 추가</button>
            </div>
        </div>
    </div>

    <!-- Edit Performance Modal -->
    <div id="editPerformanceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ 공연 정보 수정</h2>
            </div>
            <div class="modal-body">
                <form id="editPerformanceForm">
                    <div class="form-group">
                        <label for="edit_perf_id">공연 ID (수정 불가)</label>
                        <input type="text" id="edit_perf_id" name="id" readonly
                            style="background-color: #f3f4f6; cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_title">공연명</label>
                        <input type="text" id="edit_perf_title" name="title" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_category">카테고리</label>
                        <select id="edit_perf_category" name="category" required>
                            <option value="concert">콘서트 (Concert)</option>
                            <option value="musical">뮤지컬 (Musical)</option>
                            <option value="sports">스포츠 (Sports)</option>
                            <option value="exhibition">전시 (Exhibition)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_venue">장소</label>
                        <input type="text" id="edit_perf_venue" name="venue" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_dates">공연 날짜 (콤마로 구분)</label>
                        <input type="text" id="edit_perf_dates" name="dates" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_times">공연 시간 (콤마로 구분)</label>
                        <input type="text" id="edit_perf_times" name="times" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_open_time">티켓 오픈 시간</label>
                        <input type="datetime-local" id="edit_perf_open_time" name="open_time" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_status">상태</label>
                        <select id="edit_perf_status" name="status" required>
                            <option value="upcoming">오픈 예정</option>
                            <option value="open">판매중</option>
                            <option value="closed">판매 종료</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_desc">설명</label>
                        <textarea id="edit_perf_desc" name="description"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="closeEditModalBtn">취소</button>
                <button type="submit" form="editPerformanceForm" class="btn btn-primary">수정 저장</button>
            </div>
        </div>
    </div>
    <!-- Cache-busting -->
    <!-- Core Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // 관리자 권한 체크
        if (!requireAdmin()) {
            throw new Error('Unauthorized access');
        }
    </script>

    <!-- Admin Logic -->
    <script src="js/admin.js"></script>
</body>

</html>
