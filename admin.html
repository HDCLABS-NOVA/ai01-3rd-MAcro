<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 티켓 오픈 시간 관리</title>
    <meta name="description" content="티켓 예매 시스템 관리자 페이지. 공연별 티켓 오픈 시간을 설정하고 관리합니다.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <h1>🎫 티켓 오픈 시간 관리</h1>
            <p>공연별 티켓 판매 오픈 시간을 설정하고 관리합니다</p>

            <div class="header-actions">
                <button class="btn btn-primary" id="addPerformanceBtn">
                    ➕ 새 공연 추가
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='/'">
                    🏠 메인으로
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='viewer.html'">
                    📊 로그 뷰어
                </button>
            </div>
        </header>

        <!-- Performance List -->
        <section>
            <div id="performancesContainer" class="performances-grid">
                <div class="loading">공연 목록을 불러오는 중...</div>
            </div>
        </section>

        <!-- 제한 사용자 관리 -->
        <section style="margin-top: 40px;">
            <div
                style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; padding: 24px 30px; border-radius: 12px 12px 0 0;">
                <h2 style="font-size: 22px; font-weight: 700; margin-bottom: 4px;">🚫 예매 제한 사용자</h2>
                <p style="opacity: 0.85; font-size: 14px;">봇 의심으로 예매가 제한된 사용자 목록</p>
            </div>
            <div id="restrictedUsersContainer"
                style="background: #1e1e2e; border-radius: 0 0 12px 12px; padding: 20px; min-height: 80px;">
                <div class="loading">제한 사용자 목록을 불러오는 중...</div>
            </div>
        </section>
    </div>

    <!-- Add Performance Modal -->
    <div id="addPerformanceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ 새 공연 추가</h2>
            </div>
            <div class="modal-body">
                <form id="addPerformanceForm">
                    <div class="form-group">
                        <label for="perf_id">공연 ID (영문/숫자, 고유값)</label>
                        <input type="text" id="perf_id" name="id" placeholder="예: perf005" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_title">공연명</label>
                        <input type="text" id="perf_title" name="title" placeholder="예: 2026 월드 투어" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_category">카테고리</label>
                        <select id="perf_category" name="category" required>
                            <option value="concert">콘서트 (Concert)</option>
                            <option value="musical">뮤지컬 (Musical)</option>
                            <option value="sports">스포츠 (Sports)</option>
                            <option value="exhibition">전시 (Exhibition)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="perf_venue">장소</label>
                        <input type="text" id="perf_venue" name="venue" placeholder="예: 예술의 전당" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_dates">공연 날짜 (콤마로 구분)</label>
                        <input type="text" id="perf_dates" name="dates" placeholder="예: 2026-03-01, 2026-03-02"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="perf_times">공연 시간 (콤마로 구분)</label>
                        <input type="text" id="perf_times" name="times" placeholder="예: 19:30, 14:00" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_open_time">티켓 오픈 시간</label>
                        <input type="datetime-local" id="perf_open_time" name="open_time" required>
                    </div>

                    <div class="form-group">
                        <label for="perf_desc">설명</label>
                        <textarea id="perf_desc" name="description" placeholder="공연에 대한 간단한 설명을 입력하세요"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="closeModalBtn">취소</button>
                <button type="submit" form="addPerformanceForm" class="btn btn-primary">공연 추가</button>
            </div>
        </div>
    </div>

    <!-- Edit Performance Modal -->
    <div id="editPerformanceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ 공연 정보 수정</h2>
            </div>
            <div class="modal-body">
                <form id="editPerformanceForm">
                    <div class="form-group">
                        <label for="edit_perf_id">공연 ID (수정 불가)</label>
                        <input type="text" id="edit_perf_id" name="id" readonly
                            style="background-color: #f3f4f6; cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_title">공연명</label>
                        <input type="text" id="edit_perf_title" name="title" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_category">카테고리</label>
                        <select id="edit_perf_category" name="category" required>
                            <option value="concert">콘서트 (Concert)</option>
                            <option value="musical">뮤지컬 (Musical)</option>
                            <option value="sports">스포츠 (Sports)</option>
                            <option value="exhibition">전시 (Exhibition)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_venue">장소</label>
                        <input type="text" id="edit_perf_venue" name="venue" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_dates">공연 날짜 (콤마로 구분)</label>
                        <input type="text" id="edit_perf_dates" name="dates" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_times">공연 시간 (콤마로 구분)</label>
                        <input type="text" id="edit_perf_times" name="times" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_open_time">티켓 오픈 시간</label>
                        <input type="datetime-local" id="edit_perf_open_time" name="open_time" required>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_status">상태</label>
                        <select id="edit_perf_status" name="status" required>
                            <option value="upcoming">오픈 예정</option>
                            <option value="open">판매중</option>
                            <option value="closed">판매 종료</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="edit_perf_desc">설명</label>
                        <textarea id="edit_perf_desc" name="description"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="closeEditModalBtn">취소</button>
                <button type="submit" form="editPerformanceForm" class="btn btn-primary">수정 저장</button>
            </div>
        </div>
    </div>
    <!-- Cache-busting -->
    <!-- Core Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // 관리자 권한 체크
        if (!requireAdmin()) {
            throw new Error('Unauthorized access');
        }
    </script>

    <!-- Admin Logic -->
    <script src="js/admin.js"></script>

    <script>
        // 제한 사용자 목록 로드
        async function loadRestrictedUsers() {
            const container = document.getElementById('restrictedUsersContainer');
            try {
                const res = await fetch('/api/admin/restricted-users');
                const data = await res.json();
                const users = data.restricted_users || [];

                if (users.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#9ca3af; padding:20px;">제한된 사용자가 없습니다.</p>';
                    return;
                }

                const levelNames = { 1: '1차 (3개월)', 2: '2차 (6개월)', 3: '3차 (영구)' };
                const levelColors = { 1: '#f59e0b', 2: '#ef4444', 3: '#7c3aed' };

                container.innerHTML = `
                    <table style="width:100%; border-collapse:collapse; font-size:14px;">
                        <thead>
                            <tr style="border-bottom:2px solid #374151; color:#9ca3af;">
                                <th style="padding:10px; text-align:left;">이메일</th>
                                <th style="padding:10px; text-align:center;">단계</th>
                                <th style="padding:10px; text-align:left;">사유</th>
                                <th style="padding:10px; text-align:center;">제한일</th>
                                <th style="padding:10px; text-align:center;">만료</th>
                                <th style="padding:10px; text-align:center;">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(u => `
                                <tr style="border-bottom:1px solid #2d2d3f;">
                                    <td style="padding:10px; color:#e2e8f0;">${u.email}</td>
                                    <td style="padding:10px; text-align:center;">
                                        <span style="background:${levelColors[u.level]}; color:white; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:700;">
                                            ${levelNames[u.level]}
                                        </span>
                                    </td>
                                    <td style="padding:10px; color:#94a3b8; max-width:200px;">${u.reason}</td>
                                    <td style="padding:10px; text-align:center; color:#94a3b8;">${new Date(u.restricted_at).toLocaleDateString('ko-KR')}</td>
                                    <td style="padding:10px; text-align:center; color:#94a3b8;">${u.expires_at ? new Date(u.expires_at).toLocaleDateString('ko-KR') : '영구'}</td>
                                    <td style="padding:10px; text-align:center;">
                                        <button onclick="adminUnrestrict('${u.email}')" style="background:#10b981; color:white; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; font-weight:600; font-size:12px;">해제</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                container.innerHTML = '<p style="text-align:center; color:#ef4444;">로드 실패</p>';
            }
        }

        async function adminUnrestrict(email) {
            const reason = prompt(`${email}의 예매 제한 해제 사유를 입력해주세요:`);
            if (!reason) return;
            try {
                const adminEmail = JSON.parse(sessionStorage.getItem('currentUser') || '{}').email || 'admin';
                const res = await fetch('/api/admin/unrestrict-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, reason, unrestricted_by: adminEmail })
                });
                const data = await res.json();
                if (data.success) {
                    alert(data.message);
                    loadRestrictedUsers();
                } else {
                    alert('실패: ' + (data.detail || ''));
                }
            } catch (e) {
                alert('오류: ' + e.message);
            }
        }

        // 페이지 로드 시 제한 목록 로드
        loadRestrictedUsers();
    </script>
</body>

</html>
