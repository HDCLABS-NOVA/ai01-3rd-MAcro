<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리포트 뷰어 - 매크로 탐지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #6366f1;
      --allow: #10b981;
      --challenge: #f59e0b;
      --block: #ef4444;
      --a4-w: 794px;
    }

    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .header .sub {
      font-size: 13px;
      color: var(--muted);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }

    .btn:hover {
      opacity: .82;
    }

    .btn-ghost {
      background: var(--border);
      color: var(--text);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-top input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .sidebar-top input:focus {
      border-color: var(--accent);
    }

    .report-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 0;
    }

    .report-item {
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 4px;
      border: 1px solid transparent;
      transition: background .12s, border-color .12s;
    }

    .report-item:hover {
      background: var(--border);
    }

    .report-item.active {
      background: #1e2040;
      border-color: var(--accent);
    }

    .report-item .ri-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .badge-allow {
      background: #064e3b;
      color: #34d399;
    }

    .badge-challenge {
      background: #451a03;
      color: #fbbf24;
    }

    .badge-block {
      background: #450a0a;
      color: #f87171;
    }

    .ri-booking {
      font-size: 13px;
      font-weight: 600;
    }

    .ri-time {
      font-size: 11px;
      color: var(--muted);
    }

    .ri-score {
      font-size: 12px;
      color: var(--muted);
    }

    .ri-user {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-y: auto;
      background: #c8c8c8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
      gap: 24px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* ── A4 Card ── */
    .a4-card {
      width: var(--a4-w);
      max-width: 100%;
      background: #fff;
      color: #1a1a2e;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .3);
      padding: 40px 48px;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.7;
    }

    /* Card header */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 2px solid #1a1a2e;
      padding-bottom: 14px;
      margin-bottom: 22px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
    }

    .card-sub {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .decision-badge {
      font-size: 13px;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .decision-allow {
      background: #d1fae5;
      color: #065f46;
    }

    .decision-challenge {
      background: #fef3c7;
      color: #92400e;
    }

    .decision-block {
      background: #fee2e2;
      color: #991b1b;
    }

    /* Meta row */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .meta-item {
      font-size: 12px;
    }

    .meta-item .label {
      color: #64748b;
      font-weight: 500;
    }

    .meta-item .value {
      font-weight: 700;
      margin-top: 2px;
      font-size: 13px;
      word-break: break-all;
    }

    /* Score bar */
    .score-section {
      margin-bottom: 24px;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .score-number {
      font-size: 36px;
      font-weight: 800;
    }

    .score-label {
      font-size: 13px;
      color: #64748b;
    }

    .score-bar-bg {
      height: 10px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .6s ease;
    }

    .score-low {
      background: #10b981;
    }

    .score-medium {
      background: #f59e0b;
    }

    .score-high {
      background: #ef4444;
    }

    /* Section */
    .section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    /* Metric chips */
    .metric-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      flex: 1;
      min-width: 130px;
    }

    .chip .chip-label {
      color: #64748b;
      margin-bottom: 4px;
    }

    .chip .chip-val {
      font-size: 18px;
      font-weight: 800;
    }

    .chip .chip-unit {
      font-size: 11px;
      color: #94a3b8;
    }

    .chip .chip-judge {
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    .judge-ok {
      color: #10b981;
    }

    .judge-warn {
      color: #f59e0b;
    }

    .judge-danger {
      color: #ef4444;
    }

    /* AI Insights */
    .insights-box {
      background: #f8fafc;
      border-left: 4px solid var(--accent, #6366f1);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.8;
      color: #1e293b;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .insights-box.allow {
      border-left-color: #10b981;
    }

    .insights-box.challenge {
      border-left-color: #f59e0b;
    }

    .insights-box.block {
      border-left-color: #ef4444;
    }

    /* Rule list */
    .rule-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rule-item {
      font-size: 13px;
      padding: 7px 12px;
      background: #f8fafc;
      border-radius: 6px;
      border-left: 3px solid #94a3b8;
    }

    /* Footer */
    .card-footer {
      border-top: 1px solid #e2e8f0;
      margin-top: 28px;
      padding-top: 12px;
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
    }

    /* Print */
    @media print {
      body {
        height: auto;
        overflow: visible;
        background: #fff;
      }

      .sidebar,
      .header {
        display: none;
      }

      .main {
        background: #fff;
        padding: 0;
      }

      .a4-card {
        box-shadow: none;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.7) !important;
    }
  </style>
</head>

<body>

  <header class="header">
    <div>
      <h1>🛡️ 매크로 탐지 리포트 뷰어</h1>
      <div class="sub">block_report 실시간 LLM 분석 결과</div>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost" onclick="location.href='admin.html'">← 관리자</button>
      <button class="btn btn-primary" id="printBtn" onclick="window.print()" disabled>🖨️ 인쇄</button>
      <button class="btn btn-ghost" onclick="loadReports()">🔄 새로고침</button>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div style="display:flex; gap:8px;">
          <input type="text" id="searchInput" placeholder="🔍 ID/사용자 검색…" oninput="filterReports()"
            style="flex:1; background:#1e1e2e; color:#ffffff; border:1px solid #3f3f46; padding:8px 12px; border-radius:8px; font-size:13px; outline:none;">
          <select id="statusFilter" onchange="filterReports()"
            style="width:80px; padding:0 8px; border-radius:8px; border:1px solid #3f3f46; background:#1e1e2e; color:#a1a1aa; font-size:13px; outline:none; cursor:pointer; height:36px;">
            <option value="all" style="background:#1e1e2e; color:#a1a1aa;">전체</option>
            <option value="allow" style="background:#1e1e2e; color:#a1a1aa;">정상</option>
            <option value="challenge" style="background:#1e1e2e; color:#a1a1aa;">주의</option>
            <option value="block" style="background:#1e1e2e; color:#a1a1aa;">경고</option>
          </select>
        </div>
      </div>
      <div class="report-list" id="reportList">
        <div style="padding:24px; text-align:center; color:#64748b; font-size:13px;">로딩 중…</div>
      </div>
    </aside>

    <!-- A4 Preview -->
    <main class="main" id="mainArea">
      <div class="empty-state">
        <div class="icon">📄</div>
        <p>왼쪽 목록에서 리포트를 선택하세요</p>
      </div>
    </main>
  </div>

  <script>
    let allReports = [];
    let selectedFilename = null;

    const decisionLabel = { allow: '정상', challenge: '주의', block: '경고' };
    const decisionBadge = { allow: 'badge-allow', challenge: 'badge-challenge', block: 'badge-block' };

    async function loadReports() {
      try {
        const res = await fetch('/api/reports');
        const data = await res.json();
        allReports = (data.reports || []).filter(r => r.booking_id && r.booking_id !== 'nobooking');
        renderList(allReports);
      } catch (e) {
        document.getElementById('reportList').innerHTML =
          `<div style="padding:20px;color:#ef4444;font-size:13px;">불러오기 실패: ${e.message}</div>`;
      }
    }

    function filterReports() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;

      const filtered = allReports.filter(r => {
        const matchesSearch = (r.booking_id || '').toLowerCase().includes(q) || (r.user_id || '').toLowerCase().includes(q);
        const matchesStatus = status === 'all' || (r.decision || 'allow') === status;
        return matchesSearch && matchesStatus;
      });
      renderList(filtered);
    }

    function renderList(reports) {
      const el = document.getElementById('reportList');
      if (!reports.length) {
        el.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;font-size:13px;">리포트 없음</div>';
        return;
      }
      el.innerHTML = reports.map(r => {
        const d = r.decision || 'allow';
        const score = r.risk_score != null ? (r.risk_score * 100).toFixed(1) : '-';
        const t = r.created_at_iso ? new Date(r.created_at_iso).toLocaleString('ko-KR') : '';
        const llmFile = (r.llm_report_json_path || '').split(/[\\/]/).pop();
        return `
        <div class="report-item ${selectedFilename === llmFile ? 'active' : ''}"
             onclick="selectReport('${llmFile}', this)">
          <div class="ri-top">
            <span class="badge ${decisionBadge[d]}">${decisionLabel[d]}</span>
            <span class="ri-booking">${r.booking_id || '-'}</span>
          </div>
          <div class="ri-user">${r.user_id || '-'}</div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;">
            <span class="ri-score">점수 ${score}/100</span>
            <span class="ri-time">${t}</span>
          </div>
        </div>`;
      }).join('');
    }

    async function selectReport(filename, el) {
      if (!filename) return;
      document.querySelectorAll('.report-item').forEach(i => i.classList.remove('active'));
      if (el) el.classList.add('active');
      selectedFilename = filename;
      document.getElementById('printBtn').disabled = false;

      document.getElementById('mainArea').innerHTML =
        '<div class="empty-state"><div class="icon">⏳</div><p>불러오는 중…</p></div>';

      try {
        const res = await fetch(`/api/reports/${encodeURIComponent(filename)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderA4(data);
      } catch (e) {
        document.getElementById('mainArea').innerHTML =
          `<div class="empty-state"><div class="icon">❌</div><p>로드 실패: ${e.message}</p></div>`;
      }
    }

    function judgeClass(judge) {
      if (!judge) return '';
      if (/정상|자연|미발견/.test(judge)) return 'judge-ok';
      if (/의심|소수/.test(judge)) return 'judge-warn';
      return 'judge-danger';
    }

    function renderA4(d) {
      const llm = d.llm_analysis || {};
      const ui = d.ui_fields || llm.ui_fields || {};
      const dec = d.decision || 'allow';
      const score = ui.bot_score ? ui.bot_score.value : (d.risk_summary ? d.risk_summary.total_score * 100 : 0);
      const scoreNum = parseFloat(score).toFixed(1);
      const scorePct = Math.min(parseFloat(score), 100);
      const scoreClass = scorePct >= 60 ? 'score-high' : scorePct >= 50 ? 'score-medium' : 'score-low';

      const speed = ui.speed_variability || {};
      const curve = ui.path_curvature || {};

      // markdown_report에서 AI Insights 섹션 추출
      // 형식: "[ AI Insights: ... ] ---...\n{text}\n---"
      let insights = '';
      const tryMarkdown = (md) => {
        if (!md) return '';
        // ] 뒤에 --- 있고, 그 다음 줄부터 텍스트 시작
        const m = md.match(/\[ AI Insights[^\]]*\]\s*-+\s*\n([\s\S]*?)(?:\n\s*-{3,}|$)/);
        return m ? m[1].trim() : '';
      };
      // 최상위 markdown_report 우선, 없으면 llm_analysis 내부
      insights = tryMarkdown(d.markdown_report) ||
        tryMarkdown((d.llm_analysis || {}).markdown_report) ||
        (d.llm_analysis || {}).summary_ko ||
        ((d.ui_fields || {}).suspicion_narrative_ko) ||
        ((d.llm_analysis || {}).ui_fields || {}).suspicion_narrative_ko || '';
      insights = insights.replace(/^[""]|[""]$/g, '').trim();


      const rules = (llm.top_reasons || []);
      const createdAt = d.created_at_iso ? new Date(d.created_at_iso).toLocaleString('ko-KR') : '-';

      document.getElementById('mainArea').innerHTML = `
      <div class="a4-card">

        <!-- Header -->
        <div class="card-header">
          <div>
            <div class="card-title">🛡️ 매크로 탐지 분석 리포트</div>
            <div class="card-sub">${d.report_id || '-'}</div>
          </div>
          <span class="decision-badge decision-${dec}">${decisionLabel[dec] || dec}</span>
        </div>

        <!-- Meta -->
        <div class="meta-grid">
          <div class="meta-item">
            <div class="label">예매 ID</div>
            <div class="value">${d.booking_id || '-'}</div>
          </div>
          <div class="meta-item">
            <div class="label">사용자</div>
            <div class="value">${d.target_masked_user || '-'}</div>
          </div>
          <div class="meta-item">
            <div class="label">생성 시각</div>
            <div class="value">${createdAt}</div>
          </div>
          <div class="meta-item">
            <div class="label">Flow ID</div>
            <div class="value">${d.flow_id || '-'}</div>
          </div>
          <div class="meta-item">
            <div class="label">Session ID</div>
            <div class="value">${d.session_id || '-'}</div>
          </div>
            <div class="meta-item">
            <div class="label">Request ID</div>
            <div class="value">${(d.request_id || '-').replace(/^req_/, '')}</div>
          </div>
        </div>

        <!-- Score -->
        <div class="score-section">
          <div class="section-title">봇 위험 점수</div>
          <div class="score-row">
            <div class="score-number">${scoreNum}</div>
            <div class="score-label">/ 100</div>
            <div style="margin-left:auto; font-size:15px; font-weight:700;">
              ${ui.status_title_ko || ''}
            </div>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar-fill ${scoreClass}" style="width:${scorePct}%"></div>
          </div>
        </div>

        <!-- Metrics -->
        <div class="section">
          <div class="section-title">행동 지표</div>
          <!-- 1행: 속도·궤적 -->
          <div style="display:flex;gap:10px;">
            <div class="chip" style="flex:1;">
              <div class="chip-label">반응 속도 변동성</div>
              <div>
                <span class="chip-val">${speed.value ?? '-'}</span>
                <span class="chip-unit">${speed.unit || '%'}</span>
              </div>
              <div class="chip-judge ${judgeClass(speed.judgement_ko)}">${speed.judgement_ko || '-'}</div>
            </div>
            <div class="chip" style="flex:1;">
              <div class="chip-label">궤적 곡선성</div>
              <div>
                <span class="chip-val">${curve.value ?? '-'}</span>
                <span class="chip-unit">${curve.unit || 'rad'}</span>
              </div>
              <div class="chip-judge ${judgeClass(curve.judgement_ko)}">${curve.judgement_ko || '-'}</div>
            </div>
          </div>
        </div>

        <!-- AI Insights -->
        ${insights ? `
        <div class="section">
          <div class="section-title">AI Insights: GPT 생성 종합 리포트</div>
          <div class="insights-box ${dec}">${escHtml(insights)}</div>
        </div>` : ''}

        <!-- Top Reasons -->
        ${rules.length ? `
        <div class="section">
          <div class="section-title">주요 탐지 사유</div>
          <ul class="rule-list">
            ${rules.map(r => `<li class="rule-item">• ${escHtml(r)}</li>`).join('')}
          </ul>
        </div>` : ''}

        <!-- Footer -->
        <div class="card-footer">
          <span>매크로 탐지 시스템 — 자동 생성 리포트</span>
          <span>${createdAt}</span>
        </div>

      </div>`;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // URL 파라미터로 전달된 파일이 있으면 자동으로 열기
    async function initFromUrl() {
      await loadReports();
      const params = new URLSearchParams(location.search);
      const file = params.get('file');
      if (file) {
        // 해당 리포트 아이템 찾아 active 처리
        const items = document.querySelectorAll('.report-item');
        items.forEach(el => {
          if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(encodeURIComponent(file).replace(/%/g, '%'))) {
            el.classList.add('active');
          }
        });
        selectedFilename = file;
        document.getElementById('printBtn').disabled = false;
        selectReport(file, null);
      }
    }

    initFromUrl();
  </script>
</body>

</html>
