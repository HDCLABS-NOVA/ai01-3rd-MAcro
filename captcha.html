<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보안 문자 - 티켓 예매</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <main class="page-wrapper">
        <div class="container-narrow">
            <div class="card">
                <h1 class="page-title text-center">보안 문자 입력</h1>
                <p class="text-center text-secondary mb-xl">자동 입력 방지를 위한 보안 문자를 입력해주세요</p>

                <div
                    style="background: #f0f0f0; padding: var(--spacing-xl); border-radius: var(--border-radius); text-align: center; margin-bottom: var(--spacing-lg);">
                    <div id="captcha-text"
                        style="font-size: 32px; font-weight: 700; letter-spacing: 8px; color: #333; user-select: none;">
                    </div>
                </div>

                <div class="form-group">
                    <input type="text" class="form-input" id="captcha-input" placeholder="보안 문자를 입력하세요"
                        style="text-align: center; font-size: 20px;">
                </div>

                <button class="btn btn-primary btn-lg btn-block" onclick="verifyCaptcha()">확인</button>
                <button class="btn btn-secondary btn-block mt-sm" onclick="regenerateCaptcha()">새로고침</button>

                <div id="error-msg" class="alert alert-error mt-md" style="display: none;"></div>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/logger.js"></script>
    <script src="js/browser-info.js"></script>
    <script src="js/flow-manager.js"></script>

    <script>
        loadLogFromSession();
        logStageEntry('captcha');
        // preventBackNavigation() 제거 - 뒤로가기 허용

        let captchaCode = '';
        let attempts = 0;
        const stageStart = Date.now();

        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
            captchaCode = '';
            for (let i = 0; i < 6; i++) {
                captchaCode += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('captcha-text').textContent = captchaCode;
        }

        function regenerateCaptcha() {
            generateCaptcha();
            document.getElementById('captcha-input').value = '';
            document.getElementById('error-msg').style.display = 'none';
        }

        function verifyCaptcha() {
            const input = document.getElementById('captcha-input').value.toUpperCase();
            const errorMsg = document.getElementById('error-msg');
            attempts++;

            if (input === captchaCode) {
                const timeTaken = Date.now() - stageStart;

                logStageExit('captcha', {
                    attempts: attempts,
                    time_to_solve_ms: timeTaken
                });

                showAlert('인증되었습니다!', 'success');
                setTimeout(() => {
                    navigateTo('seat_select.html');
                }, 800);
            } else {
                errorMsg.textContent = '보안 문자가 일치하지 않습니다. 다시 시도해주세요.';
                errorMsg.style.display = 'block';
                regenerateCaptcha();
            }
        }

        // Enter 키 이벤트
        document.getElementById('captcha-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verifyCaptcha();
            }
        });

        generateCaptcha();
    </script>
</body>

</html>
