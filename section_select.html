<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구역 선택 - 티켓 예매</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">🎫 Ticket</a>
            <div class="user-menu"></div>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="container">
            <h1 class="page-title">좌석 구역 선택</h1>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: var(--spacing-xl);">
                <div>
                    <div class="card mb-lg">
                        <h3 class="mb-md">공연장 배치도</h3>
                        <div id="venue-map"
                            style="background: #f8f9fa; padding: var(--spacing-xl); border-radius: var(--border-radius); min-height: 400px;">
                            <svg width="100%" height="400" id="section-map"></svg>
                        </div>
                    </div>

                    <div id="grade-options" class="grid grid-2"></div>
                </div>

                <div>
                    <div class="selection-summary">
                        <div class="summary-title">선택 정보</div>
                        <div class="summary-item">
                            <span>공연</span>
                            <span id="summary-perf">-</span>
                        </div>
                        <div class="summary-item">
                            <span>날짜/시간</span>
                            <span id="summary-datetime">-</span>
                        </div>
                        <div class="summary-item">
                            <span>선택 구역</span>
                            <span id="summary-section">미선택</span>
                        </div>
                        <button id="next-btn" class="btn btn-primary btn-block mt-lg" style="display: none;"
                            onclick="goToSeatSelect()">
                            좌석 선택하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/logger.js"></script>
    <script src="js/browser-info.js"></script>
    <script src="js/flow-manager.js"></script>

    <script src="js/section_select.js"></script>
</body>

</html>
