<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>좌석 선택 - 티켓 예매</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/seat_select.css">
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">🎫 Ticket</a>
            <div class="user-menu"></div>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="container">
            <h1 class="page-title">좌석 선택</h1>
            <p class="page-subtitle" id="perf-info">공연 정보</p>

            <div style="display: grid; grid-template-columns: 3fr 1fr; gap: var(--spacing-xl);">
                <div>
                    <div class="card" style="background: #1a1a1a; padding: var(--spacing-xl);">
                        <!-- 무대 -->
                        <div style="text-align: center; margin-bottom: var(--spacing-xl);">
                            <div
                                style="background: linear-gradient(180deg, #FF3D7F 0%, #C2185B 100%); color: white; padding: var(--spacing-md) var(--spacing-xl); display: inline-block; border-radius: 50px 50px 0 0; font-weight: 700; letter-spacing: 2px; box-shadow: 0 4px 12px rgba(255,61,127,0.4);">
                                STAGE
                            </div>
                        </div>

                        <!-- 좌석 그리드 -->
                        <div id="seat-grid"
                            style="background: rgba(255,255,255,0.02); padding: var(--spacing-lg); border-radius: var(--border-radius);">
                        </div>

                        <!-- 범례 -->
                        <div class="mt-xl"
                            style="display: flex; gap: var(--spacing-xl); justify-content: center; padding: var(--spacing-md); background: rgba(255,255,255,0.05); border-radius: var(--border-radius);">
                            <div style="display: flex; align-items: center; gap: var(--spacing-sm);">
                                <span class="seat available"
                                    style="pointer-events: none; width: 14px; height: 14px; line-height: 14px; font-size: 8px;">A1</span>
                                <span style="color: #fff; font-size: 14px;">선택가능</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: var(--spacing-sm);">
                                <span class="seat selected"
                                    style="pointer-events: none; width: 14px; height: 14px; line-height: 14px; font-size: 8px;">A1</span>
                                <span style="color: #fff; font-size: 14px;">선택됨</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: var(--spacing-sm);">
                                <span class="seat taken"
                                    style="pointer-events: none; width: 14px; height: 14px; line-height: 14px; font-size: 8px;">A1</span>
                                <span style="color: #fff; font-size: 14px;">매진</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="selection-summary" style="position: sticky; top: 20px;">
                        <div class="summary-title"
                            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: var(--spacing-md); margin: calc(var(--spacing-md) * -1) calc(var(--spacing-md) * -1) var(--spacing-md); border-radius: var(--border-radius) var(--border-radius) 0 0;">
                            선택 좌석</div>

                        <div id="selected-seats-list" class="mb-md"
                            style="min-height: 80px; max-height: 200px; overflow-y: auto;">
                            <p style="color: var(--text-secondary); text-align: center; padding: var(--spacing-lg) 0;">
                                좌석을 선택해주세요<br><small>(최대 4석)</small></p>
                        </div>

                        <div
                            style="border-top: 2px solid var(--border-color); padding-top: var(--spacing-md); margin-top: var(--spacing-md);">
                            <div class="summary-item">
                                <span>등급</span>
                                <span id="summary-section" style="font-weight: 700;">-</span>
                            </div>
                            <div class="summary-item">
                                <span>좌석 수</span>
                                <span id="summary-seats" style="font-weight: 700; color: var(--primary-color);">-</span>
                            </div>
                            <div class="summary-item" style="font-size: 18px; margin-top: var(--spacing-md);">
                                <span style="font-weight: 700;">총 금액</span>
                                <span id="summary-price" style="font-weight: 700; color: var(--primary-color);">-</span>
                            </div>
                        </div>

                        <button id="next-btn" class="btn btn-primary btn-block btn-lg mt-lg" style="display: none;"
                            onclick="confirmSeats()">
                            선택 완료
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/log_collect.js"></script>
    <script src="js/flow-manager.js"></script>
    <script src="js/seat_select.js"></script>

    <!-- 알림 모달 -->
    <div id="alert-overlay">
        <div id="alert-modal">
            <h3 id="alert-modal-title">알림</h3>
            <p id="alert-modal-message">메시지 내용</p>
            <button id="alert-confirm-btn">확인</button>
        </div>
    </div>

    <!-- 보안문자 팝업 (페이지 최상위) -->
    <div id="captcha-overlay" class="captcha-hidden">
        <div id="captcha-modal">
            <h2>화면의 문자를 입력해주세요</h2>
            <p>문자 입력 인증 후 좌석을 선택할 수 있습니다</p>

            <div class="captcha-canvas-container">
                <button onclick="generateCaptcha()" class="captcha-btn captcha-btn-left">🔊</button>
                <button onclick="generateCaptcha()" class="captcha-btn captcha-btn-right">🔄</button>
                <canvas id="captcha-canvas" width="450" height="150"></canvas>
            </div>

            <input type="text" id="captcha-input" placeholder="화면의 문자를 입력해주세요 (대소문자 구분없음)"
                onkeypress="if(event.key === 'Enter') verifyCaptcha()" />

            <button onclick="verifyCaptcha()" id="captcha-submit-btn">입력완료</button>
        </div>
    </div>
</body>

</html>
