<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 티켓 예매</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">🎫 Ticket</a>
            <div class="user-menu"></div>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="container-narrow">
            <div class="card">
                <h1 class="page-title text-center">로그인</h1>
                <p class="text-center text-secondary mb-xl">티켓 예매를 위해 로그인하세요</p>

                <!-- 디버깅: 리턴 URL 표시 -->
                <div id="debug-info"
                    style="background: #f0f0f0; padding: 10px; margin-bottom: 20px; border-radius: 8px; font-size: 12px; font-family: monospace;">
                    <strong>🔍 디버그:</strong><br>
                    현재 URL: <span id="current-url"></span><br>
                    Return 파라미터: <span id="return-param" style="color: #FF3D7F; font-weight: bold;"></span>
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">이메일</label>
                        <input type="email" class="form-input" id="email" placeholder="example@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">비밀번호</label>
                        <input type="password" class="form-input" id="password" placeholder="비밀번호를 입력하세요" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg btn-block">로그인</button>
                </form>

                <div class="text-center mt-lg">
                    <p>계정이 없으신가요? <a href="signup.html" style="color: var(--primary-color); font-weight: 600;">회원가입</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>

    <script src="js/login.js"></script>
</body>

</html>
