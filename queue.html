<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대기열 - 티켓 예매</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <main class="page-wrapper">
        <div class="container-narrow">
            <div class="queue-card">
                <h1 style="font-size: 28px; margin-bottom: var(--spacing-md);">대기열에 접속했습니다</h1>
                <p style="opacity: 0.9;">순서가 되면 자동으로 좌석 선택 페이지로 이동합니다.</p>

                <div class="queue-position" id="queue-position">-</div>
                <div class="queue-total" id="queue-total">전체 대기: - 명</div>

                <div style="margin-top: var(--spacing-xl);">
                    <div class="spinner" style="border-color: rgba(255,255,255,0.3); border-top-color: white;"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/log_collect.js"></script>
    <script src="js/flow-manager.js"></script>
    <script src="js/queue.js"></script>
</body>

</html>
