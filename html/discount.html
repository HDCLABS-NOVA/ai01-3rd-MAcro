<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할인 선택 - 티켓 예매</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">🎫 Ticket</a>
            <div class="user-menu"></div>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="container-narrow">
            <h1 class="page-title">할인 권종 선택</h1>

            <div class="discount-option selected" data-type="normal" data-rate="0"
                onclick="selectDiscount('normal', 0, this)">
                <div class="discount-option-title">일반 예매</div>
                <div class="discount-option-desc">할인 없음</div>
                <div class="discount-option-price" id="price-normal">-</div>
            </div>

            <div class="discount-option" data-type="student" data-rate="10"
                onclick="selectDiscount('student', 10, this)">
                <div class="discount-option-title">학생 할인</div>
                <div class="discount-option-desc">10% 할인 (학생증 필수)</div>
                <div class="discount-option-price" id="price-student">-</div>
            </div>

            <div class="discount-option" data-type="disabled" data-rate="30"
                onclick="selectDiscount('disabled', 30, this)">
                <div class="discount-option-title">장애인 할인</div>
                <div class="discount-option-desc">30% 할인 (복지카드 필수)</div>
                <div class="discount-option-price" id="price-disabled">-</div>
            </div>

            <div class="discount-option" data-type="senior" data-rate="20" onclick="selectDiscount('senior', 20, this)">
                <div class="discount-option-title">경로 우대</div>
                <div class="discount-option-desc">20% 할인 (만 65세 이상)</div>
                <div class="discount-option-price" id="price-senior">-</div>
            </div>

            <div class="card mt-xl">
                <div class="summary-item">
                    <span>원가</span>
                    <span id="original-price">-</span>
                </div>
                <div class="summary-item">
                    <span>할인</span>
                    <span id="discount-amount" style="color: var(--primary-color);">-</span>
                </div>
                <div class="summary-item">
                    <span>최종 금액</span>
                    <span id="final-price">-</span>
                </div>
            </div>

            <button class="btn btn-primary btn-lg btn-block mt-lg" onclick="confirmDiscount()">다음 단계</button>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/log_collect.js"></script>
    <script src="js/flow-manager.js"></script>

    <script src="js/discount.js"></script>
</body>

</html>
