<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예매 로그 뷰어</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .log-item {
            background: var(--card-bg);
            padding: var(--spacing-lg);
            border-radius: var(--border-radius);
            margin-bottom: var(--spacing-md);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .log-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: #667eea;
            color: white;
            padding: var(--spacing-lg);
            border-radius: var(--border-radius);
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .canvas-container {
            position: relative;
            background: #1a1a1a;
            padding: var(--spacing-lg);
            border-radius: var(--border-radius);
            margin-top: var(--spacing-lg);
        }

        canvas {
            border: 1px solid #333;
            border-radius: var(--border-radius);
            background: white;
            display: block;
            margin: 0 auto;
        }

        .tremor-view {
            background: #f5f5f5;
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            margin-top: var(--spacing-md);
            border: 2px solid #2196F3;
            position: relative;
        }

        .canvas-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.5;
        }

        .stage-btn {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .analysis-card {
            background: var(--card-bg);
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            border-left: 4px solid var(--primary-color);
        }

        .bot-score {
            font-size: 40px;
            font-weight: 700;
            text-align: center;
            margin: var(--spacing-lg) 0;
        }

        .bot-score.human {
            color: #4CAF50;
        }

        .bot-score.suspicious {
            color: #FF9800;
        }

        .bot-score.bot {
            color: #F44336;
        }

        .stage-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s;
            margin-right: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
        }

        .stage-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">🎫 Ticket</a>
            <nav style="display: flex; gap: var(--spacing-md);">
                <a href="viewer_performance.html" style="color: var(--text-secondary);">공연창</a>
                <a href="viewer_booking.html" style="color: var(--primary-color); font-weight: 600;">예매창</a>
            </nav>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="container">
            <h1 class="page-title">🎫 예매 로그 분석</h1>
            <p class="page-subtitle">좌석 선택 → 결제 완료까지</p>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="total-logs">0</div>
                    <div class="stat-label">총 로그 수</div>
                </div>
                <div class="stat-card" style="background: #667eea;">
                    <div class="stat-number" id="avg-duration">-</div>
                    <div class="stat-label">평균 소요시간</div>
                </div>
                <div class="stat-card" style="background: #4CAF50;">
                    <div class="stat-number" id="completion-rate">-</div>
                    <div class="stat-label">완료율</div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: var(--spacing-md);">로그 목록</h3>
                <div id="logs-list">
                    <p style="text-align: center; color: var(--text-secondary);">로그를 불러오는 중...</p>
                </div>
            </div>

            <div id="analysis-container" style="display: none;">
                <h3 style="margin-top: var(--spacing-xl); margin-bottom: var(--spacing-md);">🔍 마우스 트래킹 분석</h3>

                <div class="card">
                    <h4 style="margin-bottom: var(--spacing-md);">단계별 분석</h4>
                    <div id="stage-selector" style="margin-bottom: var(--spacing-md);"></div>

                    <div class="canvas-container">
                        <canvas id="main-canvas" width="1400" height="900"></canvas>
                    </div>

                    <div id="tremor-container" style="display: none;">
                        <h4 style="margin-top: var(--spacing-lg); margin-bottom: var(--spacing-md);">🔬 호버 영역 미세 떨림 분석
                            (10배 확대)
                        </h4>

                        <!-- 호버 구간 선택 버튼 -->
                        <div id="hover-selector" style="margin-bottom: var(--spacing-md);"></div>

                        <div class="tremor-view">
                            <canvas id="tremor-canvas" width="600" height="600"></canvas>
                            <div id="tremor-tooltip" class="canvas-tooltip"></div>
                            <div id="tremor-stats" style="margin-top: var(--spacing-md);"></div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: var(--spacing-lg);">
                    <h4 style="margin-bottom: var(--spacing-md);">🤖 봇 탐지 분석</h4>
                    <div id="bot-analysis"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // 관리자 권한 체크
        if (!requireAdmin()) {
            throw new Error('Unauthorized access');
        }

        let allLogs = [];
        let currentLog = null;
        let currentStage = null;
        let hoverSegments = [];

        const BOOKING_STAGES = ['seat_captcha', 'seat_pick', 'discount', 'order_info', 'payment'];
        const STAGE_NAMES = {
            'seat_captcha': '보안문자',
            'seat_pick': '좌석 선택',
            'discount': '할인',
            'order_info': '배송 정보',
            'payment': '결제'
        };

        async function loadLogs() {
            try {
                // 캐시 방지를 위한 타임스탬프 추가
                const timestamp = new Date().getTime();
                const response = await fetch(`/api/logs?_t=${timestamp}`);
                const data = await response.json();

                if (!data.success || data.files.length === 0) {
                    document.getElementById('logs-list').innerHTML = '<p style="text-align: center; color: var(--text-secondary);">저장된 로그가 없습니다.</p>';
                    return;
                }

                const logPromises = data.files.map(filename =>
                    fetch(`/api/logs/${filename}?_t=${timestamp}`).then(res => res.json())
                );

                const logDetails = await Promise.all(logPromises);
                allLogs = logDetails.map(log => log.data).filter(log => log.stages.seat || log.stages.seat_captcha || log.stages.seat_pick);

                document.getElementById('total-logs').textContent = allLogs.length;

                const completedLogs = allLogs.filter(log => log.stages.payment && log.stages.payment.completed);
                const completionRate = allLogs.length > 0 ? (completedLogs.length / allLogs.length * 100).toFixed(1) : 0;
                document.getElementById('completion-rate').textContent = completionRate + '%';

                if (completedLogs.length > 0) {
                    const durations = completedLogs.map(log => {
                        let total = 0;
                        BOOKING_STAGES.forEach(stage => {
                            if (log.stages[stage]) total += log.stages[stage].duration_ms;
                        });
                        return total;
                    });
                    const avgDur = durations.reduce((a, b) => a + b, 0) / durations.length;
                    document.getElementById('avg-duration').textContent = (avgDur / 1000).toFixed(1) + '초';
                }

                displayLogsList(allLogs);

            } catch (error) {
                console.error('로그 로딩 에러:', error);
            }
        }

        function displayLogsList(logs) {
            const listContainer = document.getElementById('logs-list');

            listContainer.innerHTML = logs.map((log, index) => {
                const completed = log.stages.payment && log.stages.payment.completed;
                const status = completed ? '✅ 완료' : '❌ 미완료';

                let totalDuration = 0;
                BOOKING_STAGES.forEach(stage => {
                    if (log.stages[stage]) totalDuration += log.stages[stage].duration_ms;
                });

                const date = new Date(log.metadata.created_at).toLocaleString('ko-KR');
                const seats = log.metadata.final_seats?.join(', ') || '-';

                return `
                    <div class="log-item" onclick="showAnalysis(${index})">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-sm);">
                            <div style="display: flex; gap: var(--spacing-md); align-items: center;">
                                <span style="font-size: 20px;">${status}</span>
                                <span style="font-weight: 700; color: var(--primary-color);">${log.metadata.flow_id}</span>
                            </div>
                            <span style="color: var(--text-secondary); font-size: 14px;">${date}</span>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: var(--spacing-sm); font-size: 14px;">
                            <div><strong>공연:</strong> ${log.metadata.performance_title || '-'}</div>
                            <div><strong>좌석:</strong> ${seats}</div>
                            <div><strong>소요시간:</strong> ${(totalDuration / 1000).toFixed(1)}초</div>
                            ${log.metadata.booking_id ? `<div><strong>예매번호:</strong> ${log.metadata.booking_id}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showAnalysis(index) {
            currentLog = allLogs[index];
            const container = document.getElementById('analysis-container');
            container.style.display = 'block';

            createStageSelector();
            // 첫 번째로 존재하는 스테이지를 기본 선택
            const firstStage = BOOKING_STAGES.find(s => currentLog.stages[s]) || BOOKING_STAGES[0];
            selectStage(firstStage);
            // 봇 분석: 전체 스테이지 종합
            analyzeBotBehavior(currentLog);

            container.scrollIntoView({ behavior: 'smooth' });
        }

        function createStageSelector() {
            const selector = document.getElementById('stage-selector');
            const buttons = BOOKING_STAGES
                .filter(stage => currentLog.stages[stage])
                .map(stage => `
                    <button class="stage-btn" onclick="selectStage('${stage}')" data-stage="${stage}">
                        ${STAGE_NAMES[stage]}
                    </button>
                `).join('');

            selector.innerHTML = buttons;
        }

        function selectStage(stage) {
            currentStage = stage;

            document.querySelectorAll('.stage-btn').forEach(btn => {
                if (btn.dataset.stage === stage) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            drawMainCanvas(currentLog.stages[stage]);
            // 봇 분석 카드는 항상 표시 (전체 로그 기준으로 고정)

        }

        function drawMainCanvas(stageData) {
            const canvas = document.getElementById('main-canvas');
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const trajectory = stageData.mouse_trajectory || [];
            const clicks = stageData.clicks || [];
            hoverSegments = [];

            if (trajectory.length === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('마우스 트래킹 데이터가 없습니다', canvas.width / 2, canvas.height / 2);
                return;
            }

            // 호버 구간 찾기
            let currentHover = [];
            for (let i = 1; i < trajectory.length; i++) {
                const prev = trajectory[i - 1];
                const curr = trajectory[i];
                const distance = Math.sqrt(Math.pow(curr[0] - prev[0], 2) + Math.pow(curr[1] - prev[1], 2));
                const timeDiff = (curr[2] - prev[2]) / 1000;
                const speed = timeDiff > 0 ? distance / timeDiff : 0;

                // 호버 판정: 속도 200 px/s 미만 && 미세 움직임 있음
                if (speed < 200 && distance > 0) {
                    currentHover.push(curr);
                } else {
                    if (currentHover.length > 5) {
                        // const hasTarget = currentHover.some(p => p.length > 3 && typeof p[3] === 'string' && isNaN(Number(p[3])));
                        // if (hasTarget) {
                        hoverSegments.push([...currentHover]);
                        // }
                    }
                    currentHover = [];
                }
            }

            // [추가] 중요: 호버 구간 병합 및 필터링 (노이즈 제거)
            // 1. 같은 타겟에서 연속된 호버는 하나로 합침
            // 2. 합친 결과가 0.5초 미만이면 "고민 아님"으로 간주하고 삭제
            if (hoverSegments.length > 0) {
                const mergedSegments = [];
                let currentGroup = hoverSegments[0];

                // 타겟 추출 헬퍼 함수
                const getTarget = (seg) => {
                    // 세그먼트 내에서 가장 많이 등장한 타겟 찾기
                    const counts = {};
                    let max = 0;
                    let best = null;
                    seg.forEach(p => {
                        if (p.length > 3 && typeof p[3] === 'string' && isNaN(Number(p[3]))) {
                            counts[p[3]] = (counts[p[3]] || 0) + 1;
                            if (counts[p[3]] > max) { max = counts[p[3]]; best = p[3]; }
                        }
                    });
                    return best;
                };

                let currentTarget = getTarget(currentGroup);

                for (let i = 1; i < hoverSegments.length; i++) {
                    const nextSeg = hoverSegments[i];
                    const nextTarget = getTarget(nextSeg);

                    // 같은 타겟이고, 시간 차이가 1초 이내라면 병합
                    const timeDiff = nextSeg[0][2] - currentGroup[currentGroup.length - 1][2];

                    if (currentTarget && nextTarget === currentTarget && timeDiff < 1000) {
                        currentGroup = currentGroup.concat(nextSeg);
                    } else {
                        mergedSegments.push(currentGroup);
                        currentGroup = nextSeg;
                        currentTarget = nextTarget;
                    }
                }
                mergedSegments.push(currentGroup);

                // 0.3초(300ms) 이상인 것만 남김 (기준 완화)
                hoverSegments = mergedSegments.filter(seg => {
                    const duration = seg[seg.length - 1][2] - seg[0][2];
                    return duration >= 300;
                });
            }

            // [추가] 중요: 클릭이 발생한 지점은 속도와 상관없이 강제로 호버 구간으로 포함
            // 사용자가 클릭했다는 것은 분명한 '관심'의 표현이므로 분석 대상에 포함되어야 함
            clicks.forEach(click => {
                let clickTime;

                // 타임스탬프 정규화
                if (typeof click.timestamp === 'string' && click.timestamp.includes('T')) {
                    clickTime = new Date(click.timestamp).getTime();
                    const startTime = new Date(stageData.entry_time).getTime();
                    clickTime = clickTime - startTime; // 상대 시간으로 변환
                } else {
                    clickTime = click.timestamp;
                }

                // 클릭 시점 전후 0.5초(500ms) 구간의 궤적 찾기
                let clickSegment = trajectory.filter(p => {
                    const t = p[2];
                    return t >= clickTime - 500 && t <= clickTime + 500;
                });

                // [중요] 궤적 데이터가 없거나 매칭되지 않아도, 클릭은 반드시 표시해야 함
                // 인위적인 호버 포인트를 생성하여 추가
                if (clickSegment.length === 0) {
                    clickSegment = [];
                    // 클릭 위치에 5개의 인위적 포인트 생성 (약 250ms 분량처럼 보이게)
                    for (let k = 0; k < 5; k++) {
                        const timeOffset = (k - 2) * 50; // -100ms ~ +100ms
                        clickSegment.push([click.x, click.y, clickTime + timeOffset, click.target || null]);
                    }
                }

                if (clickSegment.length > 0) {
                    // 이미 존재하는 호버 구간과 겹치는지 확인
                    const isOverlapping = hoverSegments.some(segment => {
                        const start = segment[0][2];
                        const end = segment[segment.length - 1][2];
                        // 구간이 겹치면 중복 추가 방지
                        return (clickTime >= start - 100 && clickTime <= end + 100);
                    });

                    if (!isOverlapping) {
                        hoverSegments.push(clickSegment);
                    }
                }
            });

            // 시간순 정렬 (호버 구간이 뒤죽박죽되지 않도록)
            hoverSegments.sort((a, b) => a[0][2] - b[0][2]);

            // 마우스 경로
            ctx.strokeStyle = '#2196F3';
            ctx.lineWidth = 2;
            ctx.beginPath();
            trajectory.forEach((point, index) => {
                if (index === 0) ctx.moveTo(point[0], point[1]);
                else ctx.lineTo(point[0], point[1]);
            });
            ctx.stroke();

            // 호버 구간
            hoverSegments.forEach((segment, idx) => {
                ctx.strokeStyle = '#FF9800';
                ctx.lineWidth = 3;
                ctx.beginPath();

                segment.forEach((point, i) => {
                    if (i === 0) ctx.moveTo(point[0], point[1]);
                    else ctx.lineTo(point[0], point[1]);
                });
                ctx.stroke();

                const mid = segment[Math.floor(segment.length / 2)];
                ctx.fillStyle = '#FF9800';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(`호버${idx + 1}`, mid[0] + 10, mid[1] - 10);
            });

            // 시작/끝
            if (trajectory.length > 0) {
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.arc(trajectory[0][0], trajectory[0][1], 8, 0, Math.PI * 2);
                ctx.fill();
            }

            if (trajectory.length > 1) {
                ctx.fillStyle = '#F44336';
                ctx.beginPath();
                const end = trajectory[trajectory.length - 1];
                ctx.arc(end[0], end[1], 8, 0, Math.PI * 2);
                ctx.fill();
            }

            // 클릭
            clicks.forEach((click) => {
                ctx.fillStyle = 'rgba(255, 61, 127, 0.3)';
                ctx.beginPath();
                ctx.arc(click.x, click.y, 15, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#FF3D7F';
                ctx.beginPath();
                ctx.arc(click.x, click.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // 호버 구간 분석
            if (hoverSegments.length > 0) {
                document.getElementById('tremor-container').style.display = 'block';
                createHoverSelector();
                analyzeHoverTremor(0);
            } else {
                document.getElementById('tremor-container').style.display = 'none';
            }
        }

        function createHoverSelector() {
            const selector = document.getElementById('hover-selector');
            const buttons = hoverSegments.map((segment, index) => `
                <button class="stage-btn hover-btn" onclick="analyzeHoverTremor(${index})" data-hover="${index}">
                    호버 구간 ${index + 1} (${segment.length}개 포인트)
                </button>
            `).join('');

            selector.innerHTML = buttons;

            // 첫 번째 버튼 활성화
            const firstBtn = selector.querySelector('.hover-btn[data-hover="0"]');
            if (firstBtn) firstBtn.classList.add('active');
        }

        function analyzeHoverTremor(hoverIndex) {
            const segment = hoverSegments[hoverIndex];
            if (!segment || segment.length < 3) return;

            // 버튼 활성화 상태 업데이트
            document.querySelectorAll('.hover-btn').forEach(btn => {
                if (btn.dataset.hover === String(hoverIndex)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            const canvas = document.getElementById('tremor-canvas');
            const ctx = canvas.getContext('2d');
            const tooltip = document.getElementById('tremor-tooltip');

            const stageData = currentLog.stages[currentStage]; // 현재 스테이지 데이터 가져오기

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = segment.reduce((sum, p) => sum + p[0], 0) / segment.length;
            const centerY = segment.reduce((sum, p) => sum + p[1], 0) / segment.length;

            const scale = 10;
            const offsetX = canvas.width / 2;
            const offsetY = canvas.height / 2;

            // 격자 및 숫자 표시
            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#aaa';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            for (let i = -20; i <= 20; i++) {
                if (i === 0) continue;
                const x = offsetX + i * 20;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();

                const y = offsetY + i * 20;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();

                if (i % 2 === 0) {
                    ctx.fillText(i * 2, x, offsetY + 5);
                    ctx.fillText(i * 2, offsetX + 5, y);
                }
            }

            // 중심선
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(offsetX, 0);
            ctx.lineTo(offsetX, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, offsetY);
            ctx.lineTo(canvas.width, offsetY);
            ctx.stroke();

            // 호버 경로
            ctx.strokeStyle = '#FF9800';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const displayPoints = [];
            const displayClicks = [];

            segment.forEach((point, index) => {
                const x = offsetX + (point[0] - centerX) * scale;
                const y = offsetY + (point[1] - centerY) * scale;
                displayPoints.push({ x: x, y: y, original: point });

                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // 포인트
            displayPoints.forEach(p => {
                ctx.fillStyle = '#FF9800';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // --- 타겟 확인 (직접 로깅된 데이터 우선) ---
            let relevantClickTarget = null;

            // 1. 직접 로깅된 타겟 확인 (trajectory 포인트의 4번째 값)
            const targetCounts = {};
            let maxCount = 0;
            let bestTarget = null;

            segment.forEach(p => {
                // p[3]이 문자열이면서 숫자로 변환되지 않는 경우(좌석 ID 등)에만 타겟으로 인정
                // 숫자 문자열(예: "0.5123")은 좌표값이므로 제외
                if (p.length > 3 && typeof p[3] === 'string' && isNaN(Number(p[3]))) {
                    const t = p[3];
                    targetCounts[t] = (targetCounts[t] || 0) + 1;
                    if (targetCounts[t] > maxCount) {
                        maxCount = targetCounts[t];
                        bestTarget = t;
                    }
                }
            });

            if (bestTarget) {
                relevantClickTarget = bestTarget;
            }

            // 2. 기존 거리 기반 클릭 매칭 (백업)
            if (!relevantClickTarget && stageData && stageData.clicks && stageData.clicks.length > 0) {
                const startTime = segment[0][2];
                const endTime = segment[segment.length - 1][2];

                let candidates = stageData.clicks.filter(c =>
                    (c.timestamp >= startTime - 30000 && c.timestamp <= endTime + 30000)
                );

                const viewW = stageData.viewport_width || 1920;
                const viewH = stageData.viewport_height || 1080; // Assuming a default height if not provided

                candidates = candidates.map(c => {
                    let cx, cy;
                    if (c.nx !== undefined) {
                        cx = c.nx * viewW;
                        cy = c.ny * viewH;
                    } else {
                        cx = c.x;
                        cy = c.y;
                    }
                    const dist = Math.sqrt(Math.pow(cx - centerX, 2) + Math.pow(cy - centerY, 2));
                    return { ...c, _dist: dist, _x: cx, _y: cy };
                });

                candidates.sort((a, b) => a._dist - b._dist);

                const nearestClick = candidates[0];
                if (nearestClick && nearestClick._dist < 150) {
                    relevantClickTarget = nearestClick.label || nearestClick.target;
                    if (nearestClick.target === 'seat_alert_confirm') {
                        relevantClickTarget = "팝업 확인";
                    }
                }

                candidates.forEach(click => {
                    const clickX = click._x;
                    const clickY = click._y;
                    const drawX = offsetX + (clickX - centerX) * scale;
                    const drawY = offsetY + (clickY - centerY) * scale;
                    displayClicks.push({ x: drawX, y: drawY, data: click });

                    ctx.fillStyle = 'rgba(255, 61, 127, 0.4)';
                    ctx.beginPath();
                    ctx.arc(drawX, drawY, 8, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#FF3D7F';
                    ctx.beginPath();
                    ctx.arc(drawX, drawY, 4, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            // 툴팁 이벤트
            canvas.onmousemove = function (e) {
                const mouseX = e.offsetX * (canvas.width / canvas.clientWidth);
                const mouseY = e.offsetY * (canvas.height / canvas.clientHeight);

                var found = null;
                var foundType = null;

                for (let i = 0; i < displayClicks.length; i++) {
                    const obj = displayClicks[i];
                    const dist = Math.sqrt(Math.pow(mouseX - obj.x, 2) + Math.pow(mouseY - obj.y, 2));
                    if (dist < 10) {
                        found = obj;
                        foundType = 'click';
                        break;
                    }
                }

                if (!found) {
                    for (let i = 0; i < displayPoints.length; i++) {
                        const obj = displayPoints[i];
                        const dist = Math.sqrt(Math.pow(mouseX - obj.x, 2) + Math.pow(mouseY - obj.y, 2));
                        if (dist < 10) {
                            found = { point: obj, index: i };
                            foundType = 'point';
                            break;
                        }
                    }
                }

                if (found) {
                    if (foundType === 'click') {
                        const isFailed = found.data.result === 'failed' || found.data.action === 'click_taken';
                        tooltip.innerHTML = `
                            <strong>🖱️ 클릭 감지</strong> ${isFailed ? '<span style="color:red; font-size:0.9em;">(선택 실패)</span>' : ''}<br>
                            ${found.data.label ? `<strong style="color: ${isFailed ? 'red' : '#FF3D7F'}; font-size: 1.1em;">${found.data.label}</strong><br>` : ''}
                            ID: ${found.data.target || '-'}<br>
                            ${isFailed ? '<span style="color:red;">⚠️ 이미 예매된 좌석입니다</span><br>' : ''}
                            시간: ${(found.data.timestamp / 1000).toFixed(3)}s
                        `;
                    } else {
                        // 호버 지속 시간 계산
                        const startTime = segment[0][2];
                        const endTime = segment[segment.length - 1][2];
                        const duration = (endTime - startTime) / 1000;
                        const isLongHover = duration >= 1.0;

                        tooltip.innerHTML = `
                            <strong>📍 호버 포인트 #${found.index + 1}</strong><br>
                            ${relevantClickTarget ? `<strong style="color: ${isLongHover ? '#E91E63' : '#2196F3'}; font-size: 1.2em; display:block; margin: 4px 0;">🎯 타겟: ${relevantClickTarget}</strong>` : ''}
                            지속 시간: <strong style="color: ${isLongHover ? '#E91E63' : 'inherit'}">${duration.toFixed(2)}초</strong> ${isLongHover ? '(진지한 고민)' : ''}<br>
                            상대 좌표: (${(found.point.original[0] - centerX).toFixed(2)}, ${(found.point.original[1] - centerY).toFixed(2)})<br>
                            절대 좌표: (${found.point.original[0].toFixed(1)}, ${found.point.original[1].toFixed(1)})
                        `;
                    }

                    tooltip.style.display = 'block';
                    tooltip.style.left = (e.offsetX + 15) + 'px';
                    tooltip.style.top = (e.offsetY + 15) + 'px';
                } else {
                    tooltip.style.display = 'none';
                }
            };

            canvas.onmouseleave = function () {
                tooltip.style.display = 'none';
            };


            // 통계
            const distances = [];
            for (let i = 1; i < segment.length; i++) {
                const dx = segment[i][0] - segment[i - 1][0];
                const dy = segment[i][1] - segment[i - 1][1];
                distances.push(Math.sqrt(dx * dx + dy * dy));
            }

            const avgDist = distances.reduce((a, b) => a + b, 0) / distances.length;
            const maxDist = Math.max(...distances);
            const variance = distances.reduce((sum, d) => sum + Math.pow(d - avgDist, 2), 0) / distances.length;
            const stdDev = Math.sqrt(variance);

            const statsHtml = `
                <div class="analysis-grid">
                    <div class="analysis-card">
                        <h5 style="color: var(--primary-color);">평균 떨림</h5>
                        <p style="font-size: 20px; font-weight: 700;">${avgDist.toFixed(2)} px</p>
                    </div>
                    <div class="analysis-card">
                        <h5 style="color: var(--primary-color);">최대 떨림</h5>
                        <p style="font-size: 20px; font-weight: 700;">${maxDist.toFixed(2)} px</p>
                    </div>
                    <div class="analysis-card">
                        <h5 style="color: var(--primary-color);">표준편차</h5>
                        <p style="font-size: 20px; font-weight: 700;">${stdDev.toFixed(2)} px</p>
                    </div>
                    <div class="analysis-card">
                        <h5 style="color: var(--primary-color);">포인트 수</h5>
                        <p style="font-size: 20px; font-weight: 700;">${segment.length}개</p>
                    </div>
                </div>
                <div style="margin-top: var(--spacing-md); padding: var(--spacing-md); background: ${stdDev > 2 ? 'rgba(76, 175, 80, 0.1)' : 'rgba(244, 67, 54, 0.1)'}; border-radius: var(--border-radius);">
                    <strong>${stdDev > 2 ? '✅ 자연스러운 떨림 감지 (사람)' : '⚠️ 떨림이 부족함 (봇 의심)'}</strong><br>
                    <small>사람의 호버는 일반적으로 2px 이상의 표준편차를 가집니다</small>
                </div>
            `;

            document.getElementById('tremor-stats').innerHTML = statsHtml;
        }

        function analyzeBotBehavior(logOrStage) {
            // 전체 로그가 넘어오면 모든 스테이지 합산, 단일 스테이지면 그대로 사용
            let trajectory = [], clicks = [], entryTime = null;
            if (logOrStage && logOrStage.stages) {
                // 보 분석은 좌석 선택 단계만 (할인/배송/결제 제외)
                const stagesToMerge = ['seat_captcha', 'seat_pick', 'seat'];
                stagesToMerge.forEach(stageName => {
                    const s = logOrStage.stages[stageName];
                    if (!s) return;
                    if (!entryTime) entryTime = s.entry_time;
                    (s.mouse_trajectory || []).forEach(p => trajectory.push(p));
                    (s.clicks || []).forEach(c => clicks.push({ ...c, _stage: stageName }));
                });
            } else {
                const sd = logOrStage || {};
                trajectory = sd.mouse_trajectory || [];
                clicks = sd.clicks || [];
                entryTime = sd.entry_time;
            }
            const stageData = { mouse_trajectory: trajectory, clicks, entry_time: entryTime };

            const container = document.getElementById('bot-analysis');

            if (trajectory.length < 2 && clicks.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">분석할 데이터가 부족합니다</p>';
                return;
            }

            // ── 신호 1: 최대 순간 이동 속도 (핵심 매크로 지표) ──────────────
            // pydirectinput.moveTo() = OS 레벨 순간이동 → 50ms 샘플에 300~600px 점프
            // 사람의 최대 속도 ≈ 800~1200px/s, 매크로 = 5000~30000px/s
            let maxJumpVelocity = 0;
            let maxJumpDist = 0;
            for (let i = 1; i < trajectory.length; i++) {
                const dx = trajectory[i][0] - trajectory[i - 1][0];
                const dy = trajectory[i][1] - trajectory[i - 1][1];
                const dt = (trajectory[i][2] - trajectory[i - 1][2]);
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dt > 0) {
                    const v = dist / dt * 1000;
                    if (v > maxJumpVelocity) { maxJumpVelocity = v; maxJumpDist = dist; }
                }
            }

            // 클릭에서 직접 기록된 최대 속도도 참조 (logger.js에서 이미 계산)
            const clickMaxVelocities = clicks.map(c => c.max_velocity_before || 0);
            const loggedMaxVel = clickMaxVelocities.length ? Math.max(...clickMaxVelocities) : 0;
            const effectiveMaxVel = Math.max(maxJumpVelocity, loggedMaxVel);

            // ── 신호 2: 첫 클릭까지 시간 (ISO / 상대시간 모두 처리) ──
            let firstClickTime = Infinity;
            if (clicks.length > 0) {
                const raw = clicks[0].timestamp;
                if (typeof raw === 'string' && raw.includes('T')) {
                    firstClickTime = new Date(raw).getTime() - new Date(stageData.entry_time).getTime();
                } else {
                    firstClickTime = Number(raw);
                }
                if (firstClickTime < 0) firstClickTime = Infinity;
            }

            // ── 신호 3: 클릭 직전 궤적 포인트 수 ────────────────────────────
            // 매크로: 0~3개 (순간이동), 사람: 10개+ (이동하면서 탐색)
            const trajPointsBefore = clicks.length > 0
                ? (clicks[0].traj_points_before ?? clicks.filter(c => c.traj_points_before !== undefined).reduce((s, c) => s + c.traj_points_before, 0) / clicks.length)
                : trajectory.length;

            // ── 신호 4: 클릭 지속 시간 ────────────────────────────────────────
            // 매크로(DirectInput): < 10ms, 사람: 80~250ms
            const avgClickDuration = clicks.filter(c => c.click_duration > 0).length > 0
                ? clicks.filter(c => c.click_duration > 0).reduce((s, c) => s + c.click_duration, 0) / clicks.filter(c => c.click_duration > 0).length
                : null;

            // ── 신호 5: 경로 직선성 (기존) ───────────────────────────────────
            const angles = [];
            for (let i = 1; i < trajectory.length - 1; i++) {
                const prev = trajectory[i - 1], curr = trajectory[i], next = trajectory[i + 1];
                const a1 = Math.atan2(curr[1] - prev[1], curr[0] - prev[0]);
                const a2 = Math.atan2(next[1] - curr[1], next[0] - curr[0]);
                angles.push(Math.abs(a2 - a1));
            }
            const avgAngle = angles.length ? angles.reduce((a, b) => a + b, 0) / angles.length : 0;

            // ── 봇 점수 계산 ──────────────────────────────────────────────────
            let botScore = 0;
            const reasons = [];
            const details = [];

            // [핵심] 최대 순간 이동속도 > 3000px/s = 매크로 순간이동
            if (effectiveMaxVel > 10000) {
                botScore += 40;
                reasons.push(`순간이동 감지: 최대 ${(effectiveMaxVel / 1000).toFixed(0)}k px/s`);
            } else if (effectiveMaxVel > 3000) {
                botScore += 25;
                reasons.push(`빠른 이동: 최대 ${(effectiveMaxVel / 1000).toFixed(1)}k px/s`);
            }

            // 첫 클릭 < 500ms
            if (firstClickTime < 500 && firstClickTime !== Infinity) {
                botScore += 30;
                reasons.push(`첫 클릭 ${firstClickTime}ms (인간 불가능 수준)`);
            } else if (firstClickTime < 1500 && firstClickTime !== Infinity) {
                botScore += 15;
                reasons.push(`첫 클릭 ${(firstClickTime / 1000).toFixed(1)}s (매우 빠름)`);
            }

            // 클릭 전 궤적 포인트 < 5개
            if (trajPointsBefore < 5) {
                botScore += 20;
                reasons.push(`클릭 전 이동 기록 ${trajPointsBefore.toFixed(0)}개 (순간이동 후 클릭)`);
            }

            // 클릭 지속시간 < 10ms (있는 경우)
            if (avgClickDuration !== null) {
                if (avgClickDuration < 10) {
                    botScore += 15;
                    reasons.push(`클릭 지속시간 ${avgClickDuration.toFixed(0)}ms (즉시 클릭)`);
                } else if (avgClickDuration < 40) {
                    botScore += 5;
                    reasons.push(`클릭 지속시간 ${avgClickDuration.toFixed(0)}ms (짧음)`);
                }
            }

            // 경로 직선성
            if (avgAngle < 0.15 && trajectory.length > 3) {
                botScore += 10;
                reasons.push('마우스 경로가 직선적');
            }

            // 호버 없음
            if (hoverSegments.length === 0 && trajectory.length < 10) {
                botScore += 10;
                reasons.push('탐색 호버 없음');
            }

            botScore = Math.min(100, botScore);

            let scoreClass = 'human', verdict = '✅ 정상 사용자';
            if (botScore >= 60) { scoreClass = 'bot'; verdict = '🤖 매크로/봇'; }
            else if (botScore >= 30) { scoreClass = 'suspicious'; verdict = '⚠️ 의심스러움'; }

            const velColor = effectiveMaxVel > 10000 ? '#F44336' : effectiveMaxVel > 3000 ? '#FF9800' : '#4CAF50';
            const timeColor = firstClickTime < 500 ? '#F44336' : firstClickTime < 1500 ? '#FF9800' : '#4CAF50';
            const trajColor = trajPointsBefore < 5 ? '#F44336' : '#4CAF50';
            const durColor = avgClickDuration !== null && avgClickDuration < 10 ? '#F44336' : '#4CAF50';

            container.innerHTML = `
                <div class="bot-score ${scoreClass}">${verdict} (${botScore}/100)</div>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:12px; margin-top:16px;">
                    <div class="analysis-card">
                        <h5 style="color:${velColor}">⚡ 최대 순간속도</h5>
                        <p style="font-size:20px;font-weight:700;color:${velColor}">${effectiveMaxVel > 1000 ? (effectiveMaxVel / 1000).toFixed(1) + 'k' : effectiveMaxVel.toFixed(0)} px/s</p>
                        <small>${effectiveMaxVel > 10000 ? '🤖 순간이동 (매크로)' : effectiveMaxVel > 3000 ? '⚠️ 비정상적 빠름' : '✅ 정상 범위'}</small>
                    </div>
                    <div class="analysis-card">
                        <h5 style="color:${timeColor}">⏱️ 첫 클릭 시간</h5>
                        <p style="font-size:20px;font-weight:700;color:${timeColor}">${firstClickTime === Infinity ? '-' : firstClickTime < 1000 ? firstClickTime + 'ms' : (firstClickTime / 1000).toFixed(1) + 's'}</p>
                        <small>${firstClickTime < 500 ? '🤖 불가능한 속도' : firstClickTime < 1500 ? '⚠️ 매우 빠름' : '✅ 정상'}</small>
                    </div>
                    <div class="analysis-card">
                        <h5 style="color:${trajColor}">📍 클릭 전 이동 기록</h5>
                        <p style="font-size:20px;font-weight:700;color:${trajColor}">${trajPointsBefore.toFixed(0)}개</p>
                        <small>${trajPointsBefore < 5 ? '🤖 이동없이 클릭' : '✅ 정상 탐색'}</small>
                    </div>
                    <div class="analysis-card">
                        <h5 style="color:${durColor}">🖱️ 클릭 지속시간</h5>
                        <p style="font-size:20px;font-weight:700;color:${durColor}">${avgClickDuration !== null ? avgClickDuration.toFixed(0) + 'ms' : '(구버전 로그)'}</p>
                        <small>${avgClickDuration === null ? '' : avgClickDuration < 10 ? '🤖 즉시 클릭 (봇)' : avgClickDuration < 40 ? '⚠️ 짧음' : '✅ 정상'}</small>
                    </div>
                    <div class="analysis-card">
                        <h5 style="color:var(--primary-color)">📐 경로 곡선성</h5>
                        <p style="font-size:20px;font-weight:700;">${avgAngle.toFixed(3)} rad</p>
                        <small>${avgAngle < 0.15 ? '⚠️ 직선적' : '✅ 자연스러움'}</small>
                    </div>
                    <div class="analysis-card">
                        <h5 style="color:var(--primary-color)">🔍 호버 구간</h5>
                        <p style="font-size:20px;font-weight:700;">${hoverSegments.length}개</p>
                        <small>${hoverSegments.length === 0 ? '⚠️ 탐색 없음' : '✅ 탐색 발견'}</small>
                    </div>
                </div>
                ${reasons.length > 0 ? `
                    <div style="margin-top:16px; padding:16px; background:rgba(244,67,54,0.08); border-left:4px solid #F44336; border-radius:8px;">
                        <h5>🚨 매크로 의심 요인 (${reasons.length}개):</h5>
                        <ul style="margin:8px 0 0; padding-left:20px;">
                            ${reasons.map(r => `<li style="margin:4px 0;">${r}</li>`).join('')}
                        </ul>
                    </div>
                ` : '<div style="margin-top:16px;padding:16px;background:rgba(76,175,80,0.1);border-left:4px solid #4CAF50;border-radius:8px;"><strong>✅ 의심 요인 없음 — 정상 사용자로 판단</strong></div>'}
            `;
        }

        loadLogs();
    </script>
</body>

</html>
